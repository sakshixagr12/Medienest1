<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediNest — Super Admin</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #0a7c6e; --teal-d: #064e45; --teal-l: #e6f4f2;
      --gold: #f59e0b; --red: #dc2626; --green: #16a34a;
      --ink: #1e293b; --ink-l: #64748b; --border: #e2e8f0; --bg: #f8fafc;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

    /* ── GATE SCREEN ── */
    #gate {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .gate-card {
      background: #fff; border-radius: 20px; padding: 40px 36px;
      width: 100%; max-width: 380px; text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.4);
    }
    .gate-icon { font-size: 48px; margin-bottom: 16px; }
    .gate-card h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .gate-card p { font-size: 13px; color: var(--ink-l); margin-bottom: 24px; }
    .gate-card input {
      width: 100%; padding: 13px 16px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 15px; font-family: inherit;
      text-align: center; letter-spacing: 4px; outline: none; margin-bottom: 12px;
      transition: .2s;
    }
    .gate-card input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(10,124,110,.1); }
    .gate-card button {
      width: 100%; padding: 13px; background: linear-gradient(135deg, var(--teal), #0d9e8c);
      color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: .2s;
    }
    .gate-card button:hover { transform: translateY(-1px); }
    .gate-error { font-size: 13px; color: var(--red); margin-top: 8px; display: none; }

    /* ── MAIN APP ── */
    #app { display: none; }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--teal-d), var(--teal));
      color: #fff; padding: 0 32px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 3px 16px rgba(0,0,0,.2);
    }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .header-logo .badge {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
      padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,.9);
    }
    header h1 { font-size: 20px; font-weight: 800; }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .refresh-btn {
      padding: 8px 16px; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
      border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: .2s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,.25); }

    /* Stats bar */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
      padding: 24px 32px; background: #fff; border-bottom: 1px solid var(--border);
    }
    .stat-pill { text-align: center; }
    .stat-pill .num { font-size: 28px; font-weight: 900; }
    .stat-pill .lbl { font-size: 11px; font-weight: 700; color: var(--ink-l); text-transform: uppercase; letter-spacing: .5px; }
    .num-pending { color: var(--gold); }
    .num-active  { color: var(--green); }
    .num-suspended { color: var(--red); }
    .num-total   { color: var(--teal); }

    /* Filter bar */
    .filter-bar {
      padding: 16px 32px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border); background: #fff; flex-wrap: wrap;
    }
    .filter-bar input {
      flex: 1; min-width: 220px; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: inherit; outline: none; transition: .2s;
    }
    .filter-bar input:focus { border-color: var(--teal); }
    .filter-chips { display: flex; gap: 8px; }
    .chip {
      padding: 7px 16px; border: 1.5px solid var(--border);
      border-radius: 30px; font-size: 12px; font-weight: 700;
      cursor: pointer; background: #fff; color: var(--ink-l); transition: .15s;
    }
    .chip.active-chip { background: var(--teal); border-color: var(--teal); color: #fff; }

    /* Table */
    .table-wrap { padding: 24px 32px; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .5px; color: var(--teal);
      background: var(--teal-l); border-bottom: 2px solid #c2e8e3; white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: .1s; }
    tbody tr:hover { background: #f8fafc; }
    tbody td { padding: 14px 14px; font-size: 13.5px; color: var(--ink-l); vertical-align: middle; }
    tbody td strong { color: var(--ink); font-weight: 700; }

    .status-badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    }
    .status-pending   { background: #fef9c3; color: #92400e; border: 1px solid #fde68a; }
    .status-active    { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .status-suspended { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    .actions-cell { display: flex; gap: 6px; }
    .action-btn {
      padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: none; transition: .15s; white-space: nowrap;
    }
    .btn-approve { background: #dcfce7; color: #166534; }
    .btn-approve:hover { background: var(--green); color: #fff; }
    .btn-suspend { background: #fee2e2; color: #991b1b; }
    .btn-suspend:hover { background: var(--red); color: #fff; }
    .btn-view { background: var(--teal-l); color: var(--teal); }
    .btn-view:hover { background: var(--teal); color: #fff; }

    .empty-row td { text-align: center; padding: 40px; color: #94a3b8; font-size: 15px; }

    /* Detail modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 20px; width: 100%; max-width: 600px;
      max-height: 85vh; overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,.3);
    }
    .modal-head {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff;
    }
    .modal-head h3 { font-size: 18px; font-weight: 800; color: var(--ink); }
    .close-btn { width: 32px; height: 32px; border: none; background: #f1f5f9; border-radius: 8px; cursor: pointer; font-size: 18px; }
    .modal-body { padding: 24px; }
    .detail-row { display: flex; gap: 8px; margin-bottom: 12px; font-size: 14px; }
    .detail-row .key { font-weight: 700; color: var(--ink-l); min-width: 120px; }
    .detail-row .val { color: var(--ink); flex: 1; }
    .doctor-tag {
      display: inline-block; background: var(--teal-l); color: var(--teal);
      border: 1px solid #c2e8e3; padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600; margin: 3px;
    }
    .modal-actions { display: flex; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); }
    .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: .2s; }
    .modal-approve-btn { background: var(--green); color: #fff; }
    .modal-approve-btn:hover { background: #15803d; }
    .modal-suspend-btn { background: var(--red); color: #fff; }
    .modal-suspend-btn:hover { background: #b91c1c; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1e293b; color: #fff; padding: 14px 20px;
      border-radius: 12px; font-size: 14px; font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,.3); z-index: 99999;
      transform: translateY(80px); opacity: 0; transition: .3s; pointer-events: none;
    }
    .toast.show { transform: none; opacity: 1; }
  </style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-icon">🔐</div>
    <h2>Super Admin</h2>
    <p>Enter your admin password to access the control panel</p>
    <input type="password" id="gate-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkGate()">
    <button onclick="checkGate()">Access Admin Panel</button>
    <div class="gate-error" id="gate-err">❌ Incorrect password</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-logo">
      <img src="./assets/logo.png" alt="Logo" style="height:32px; width:32px; object-fit:contain; border-radius:8px;" />
      <h1>MediNest Admin</h1>
      <div class="badge">Super Admin</div>
    </div>
    <div class="header-actions">
      <button class="refresh-btn" onclick="loadClinics()">🔄 Refresh</button>
      <button class="refresh-btn" onclick="logoutAdmin()" style="background:rgba(255,255,255,0.1)">Sign Out</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-pill"><div class="num num-total" id="stat-total">-</div><div class="lbl">Total Clinics</div></div>
    <div class="stat-pill"><div class="num num-pending" id="stat-pending">-</div><div class="lbl">Pending</div></div>
    <div class="stat-pill"><div class="num num-active" id="stat-active">-</div><div class="lbl">Active</div></div>
    <div class="stat-pill"><div class="num num-suspended" id="stat-suspended">-</div><div class="lbl">Suspended</div></div>
  </div>

  <div class="filter-bar">
    <input type="text" id="search" placeholder="Search by clinic name or email..." oninput="renderTable()">
    <div class="filter-chips">
      <button class="chip active-chip" onclick="setFilter('all',this)">All</button>
      <button class="chip" onclick="setFilter('pending',this)">Pending</button>
      <button class="chip" onclick="setFilter('active',this)">Active</button>
      <button class="chip" onclick="setFilter('suspended',this)">Suspended</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Clinic Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Registered</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="clinics-tbody">
        <tr class="empty-row"><td colspan="7">Loading clinics...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">Clinic Details</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button class="modal-approve-btn" id="modal-approve-btn" onclick="modalAction('active')">✅ Approve</button>
      <button class="modal-suspend-btn" id="modal-suspend-btn" onclick="modalAction('suspended')">⛔ Suspend</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Backend URL Configuration
  const API_URL = 'http://localhost:4002/api';

  let allClinics = [];
  let currentFilter = 'all';
  let currentModal = null;

  // Restore session
  const storedKey = sessionStorage.getItem('admin_key');
  if (storedKey) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadClinics();
  }

  async function checkGate() {
    const pass = document.getElementById('gate-pass').value;
    if (!pass) return;

    try {
      // Test the key by requesting clinics
      const res = await fetch(`${API_URL}/clinics`, {
        headers: { 'x-admin-key': pass }
      });
      const json = await res.json();
      
      if (res.ok && json.success) {
        sessionStorage.setItem('admin_key', pass);
        document.getElementById('gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        allClinics = json.data || [];
        updateStats();
        renderTable();
      } else {
        showGateError();
      }
    } catch (err) {
      showGateError();
    }
  }

  function showGateError() {
    const err = document.getElementById('gate-err');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
  }

  function logoutAdmin() {
    sessionStorage.removeItem('admin_key');
    document.getElementById('app').style.display = 'none';
    document.getElementById('gate').style.display = 'flex';
    document.getElementById('gate-pass').value = '';
  }

  async function loadClinics() {
    const key = sessionStorage.getItem('admin_key');
    if (!key) return logoutAdmin();

    try {
      const res = await fetch(`${API_URL}/clinics`, { headers: { 'x-admin-key': key } });
      
      if (res.status === 401) {
        console.warn('Unauthorized access on loadClinics. Key:', key);
        showToast('❌ Session invalid. Please log in again.');
        // Don't auto-logout immediately to let user see error
        setTimeout(logoutAdmin, 2000);
        return;
      }
      
      const json = await res.json();
      if (json.success) {
        allClinics = json.data || [];
        updateStats();
        renderTable();
      } else {
        showToast('❌ Error loading clinics: ' + json.error);
      }
    } catch (err) {
      console.error(err);
      showToast('❌ Server error getting clinics');
    }
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allClinics.length;
    document.getElementById('stat-pending').textContent = allClinics.filter(c => c.status === 'pending').length;
    document.getElementById('stat-active').textContent = allClinics.filter(c => c.status === 'active').length;
    document.getElementById('stat-suspended').textContent = allClinics.filter(c => c.status === 'suspended').length;
  }

  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active-chip'));
    el.classList.add('active-chip');
    renderTable();
  }

  function renderTable() {
    const query = document.getElementById('search').value.toLowerCase();
    let clinics = allClinics;

    if (currentFilter !== 'all') clinics = clinics.filter(c => c.status === currentFilter);
    if (query) clinics = clinics.filter(c =>
      c.name.toLowerCase().includes(query) || c.email.toLowerCase().includes(query)
    );

    const tbody = document.getElementById('clinics-tbody');
    if (clinics.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No clinics found</td></tr>';
      return;
    }

    tbody.innerHTML = clinics.map((c, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${c.name}</strong>${c.name_hindi ? '<br><span style="font-size:11px;color:#94a3b8">'+c.name_hindi+'</span>' : ''}</td>
        <td>${c.email}</td>
        <td>${c.phone || '—'}</td>
        <td>${new Date(c.created_at).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'})}</td>
        <td><span class="status-badge status-${c.status}">${c.status}</span></td>
        <td>
          <div class="actions-cell">
            <button class="action-btn btn-view" onclick="openModal('${c.id}')">View</button>
            ${c.status !== 'active' ? `<button class="action-btn btn-approve" onclick="updateStatus('${c.id}','active')">Approve</button>` : ''}
            ${c.status !== 'suspended' ? `<button class="action-btn btn-suspend" onclick="updateStatus('${c.id}','suspended')">Suspend</button>` : ''}
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function updateStatus(clinicId, status) {
    console.log('🔄 updateStatus called:', { clinicId, status });
    const label = status === 'active' ? 'Approve' : 'Suspend';
    if (!confirm(`Are you sure you want to ${label} this clinic?`)) return;

    const key = sessionStorage.getItem('admin_key');
    console.log('🔑 Admin Key found:', !!key);

    try {
      console.log('📡 Sending request to backend...');
      const res = await fetch(`${API_URL}/clinics/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': key },
        body: JSON.stringify({ clinicId, status })
      });
      
      console.log('📥 Backend Response Status:', res.status);
      if (res.status === 401) {
        console.warn('⛔ Unauthorized! Logging out...');
        alert('Your session has expired. Please log in again.');
        return logoutAdmin();
      }
      
      const json = await res.json();
      console.log('📦 JSON Data:', json);

      if (json.success) {
        const clinic = allClinics.find(c => c.id === clinicId);
        if (clinic) clinic.status = status;
        updateStats();
        renderTable();
        closeModal();
        showToast(status === 'active' ? '✅ Clinic approved!' : '⛔ Clinic suspended');
      } else {
        console.error('❌ Backend Error Message:', json.error);
        showToast('❌ Update failed: ' + json.error);
        alert('Update failed: ' + json.error);
      }
    } catch (err) {
      console.error('💥 Fetch Crash:', err);
      showToast('❌ Backend connection error');
      alert('Connection Error: ' + err.message);
    }
  }

  function openModal(clinicId) {
    currentModal = allClinics.find(c => c.id === clinicId);
    if (!currentModal) return;

    const c = currentModal;
    document.getElementById('modal-title').textContent = c.name;

    const doctors = c.clinic_doctors || [];
    document.getElementById('modal-body').innerHTML = `
      <div class="detail-row"><span class="key">Email</span><span class="val">${c.email}</span></div>
      <div class="detail-row"><span class="key">Phone</span><span class="val">${c.phone || '—'}</span></div>
      <div class="detail-row"><span class="key">Address</span><span class="val">${c.address || '—'}</span></div>
      <div class="detail-row"><span class="key">Tagline</span><span class="val">${c.tagline || '—'}</span></div>
      <div class="detail-row"><span class="key">Status</span><span class="val"><span class="status-badge status-${c.status}">${c.status}</span></span></div>
      <div class="detail-row"><span class="key">Registered</span><span class="val">${new Date(c.created_at).toLocaleString('en-IN')}</span></div>
      <div class="detail-row" style="align-items:flex-start">
        <span class="key">Doctors (${doctors.length})</span>
        <span class="val">${doctors.length ? doctors.map(d => `<span class="doctor-tag">👨‍⚕️ ${d.doctors?.name || 'Unknown'}${d.doctors?.qualification ? ' · ' + d.doctors.qualification : ''}</span>`).join('') : '<span style="color:#94a3b8">No doctors added</span>'}</span>
      </div>
    `;

    document.getElementById('modal-approve-btn').style.display = c.status !== 'active' ? 'block' : 'none';
    document.getElementById('modal-suspend-btn').style.display = c.status !== 'suspended' ? 'block' : 'none';
    document.getElementById('detail-modal').classList.add('open');
  }

  function closeModal() { document.getElementById('detail-modal').classList.remove('open'); currentModal = null; }

  function modalAction(status) {
    if (currentModal) updateStatus(currentModal.id, status);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.getElementById('detail-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-modal')) closeModal();
  });
</script>
</body>
</html>
